services:
  postgres:
    image: postgres:16-alpine
    container_name: launchpad-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-launchpad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-launchpad_secret}
      POSTGRES_DB: ${POSTGRES_DB:-launchpad}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-launchpad} -d ${POSTGRES_DB:-launchpad}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: launchpad-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-launchpad}:${POSTGRES_PASSWORD:-launchpad_secret}@postgres:5432/${POSTGRES_DB:-launchpad}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: launchpad-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    depends_on:
      - api

volumes:
  postgres_data:
